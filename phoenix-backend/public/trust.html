<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>نمادهای اعتماد ققنوس</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="/static/img/favicon.png" />

  <style>
    @font-face {
      font-family: 'Anjoman';
      src: url('/fonts/anjoman/Anjoman-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'Anjoman';
      src: url('/fonts/anjoman/Anjoman-Medium.ttf') format('truetype');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'Anjoman';
      src: url('/fonts/anjoman/Anjoman-Bold.ttf') format('truetype');
      font-weight: 700 900;
      font-style: normal;
      font-display: swap;
    }

    :root{
      --bg:#0b0f14;
      --text:#e8ecf1;
      --muted:#9aa4b2;
      --gold:#D4AF37;
      --orange:#E98A15;
      --border:rgba(255,255,255,0.10);
      --border2:rgba(255,255,255,0.06);
      --shadow:0 20px 60px rgba(0,0,0,0.35);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      font-family:'Anjoman', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:var(--bg);
      color:var(--text);
      overflow-x:hidden;
    }

    .bg{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:-1;
    }

    .glow{
      position:absolute;
      width:520px;
      height:520px;
      border-radius:999px;
      filter:blur(70px);
      opacity:.22;
    }

    .glow.gold{
      background:radial-gradient(circle, var(--gold), transparent 60%);
      right:-160px;
      top:-120px;
    }

    .glow.orange{
      background:radial-gradient(circle, var(--orange), transparent 60%);
      left:-180px;
      bottom:-160px;
      opacity:.18;
    }

    .container{
      width:min(1100px, 92%);
      margin:0 auto;
    }

    header{
      position:sticky;
      top:0;
      z-index:50;
      background:rgba(11,15,20,0.78);
      -webkit-backdrop-filter:blur(14px);
      backdrop-filter:blur(14px);
      border-bottom:1px solid var(--border2);
    }

    .nav{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:14px 0;
      gap:14px;
    }

    .brand a{
      display:flex;
      align-items:center;
      gap:10px;
      text-decoration:none;
      color:inherit;
    }

    .brand img{
      height:40px;
      display:block;
    }

    .brand-title{
      font-weight:900;
      font-size:14px;
      line-height:1.2;
    }

    .brand-title span{
      display:block;
      color:rgba(212,175,55,0.92);
      font-size:12px;
      font-weight:700;
      margin-top:2px;
    }

    .nav-links{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .nav-links a{
      text-decoration:none;
      color:var(--muted);
      font-size:13px;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid transparent;
      transition:.2s ease;
      white-space:nowrap;
    }

    .nav-links a:hover{
      color:var(--text);
      border-color:rgba(212,175,55,0.28);
      background:rgba(212,175,55,0.06);
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:10px 14px;
      border-radius:999px;
      text-decoration:none;
      font-size:13px;
      white-space:nowrap;
      transition:.2s ease;
    }

    .btn-primary{
      background:linear-gradient(135deg, rgba(212,175,55,0.95), rgba(233,138,21,0.95));
      color:#101419;
      font-weight:900;
      box-shadow:0 14px 35px rgba(212,175,55,0.14);
    }

    .btn-primary:hover{
      transform:translateY(-1px);
    }

    main{
      padding:44px 0;
    }

    .card{
      width:min(620px, 100%);
      margin:0 auto;
      border:1px solid var(--border);
      background:linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      border-radius:24px;
      padding:28px 22px;
      text-align:center;
      box-shadow:var(--shadow);
    }

    h1{
      margin:0 0 10px;
      font-size:22px;
      font-weight:900;
      line-height:1.6;
    }

    p{
      margin:0 0 24px;
      color:var(--muted);
      font-size:14px;
      line-height:2;
    }

    .trust-row{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:22px;
      flex-wrap:wrap;
      min-height:130px;
      margin-top:8px;
    }

    .trust-row img{
      max-width:115px;
      display:block;
    }

    .back-row{
      margin-top:26px;
      display:flex;
      justify-content:center;
    }

    footer{
      padding:18px 0 30px;
      border-top:1px solid var(--border2);
      color:var(--muted);
      font-size:12px;
      text-align:center;
      line-height:1.8;
      background:rgba(255,255,255,0.02);
    }

    @media (max-width: 760px){
      .nav{
        justify-content:center;
      }

      .nav-links{
        display:none;
      }

      .brand-title{
        display:none;
      }

      .brand img{
        height:40px;
      }

      main{
        padding:30px 0;
      }

      .card{
        border-radius:22px;
        padding:24px 16px;
      }

      h1{
        font-size:20px;
      }
    }
  </style>
</head>

<body>
  <div class="bg">
    <div class="glow gold"></div>
    <div class="glow orange"></div>
  </div>

  <header>
    <div class="container">
      <div class="nav">
        <div class="brand">
          <a href="/" aria-label="بازگشت به صفحه اصلی">
            <img src="/static/img/logo.png" alt="لوگوی ققنوس">
            <div class="brand-title">
              ققنوس
              <span>بازسازی بعد از شکست عشقی</span>
            </div>
          </a>
        </div>

        <nav class="nav-links" aria-label="منوی اصلی">
          <a href="/">خانه</a>
          <a href="/download.html">دانلود</a>
          <a href="/store.html">راهنمای اشتراک</a>
          <a href="/contact.html">تماس با ما</a>
          <a href="/terms.html">قوانین استفاده</a>
        </nav>

        <a class="btn btn-primary" href="/download.html">دانلود اپ</a>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h1>نمادهای اعتماد ققنوس</h1>
      <p>
        برای بررسی پرداخت امن و نمادهای اعتماد ققنوس، روی نمادها کلیک کنید.
      </p>

      <div class="trust-row">
        <div id="zarinpal">
          <script src="https://www.zarinpal.com/webservice/TrustCode" type="text/javascript"></script>
        </div>

        <a
          referrerpolicy="origin"
          target="_blank"
          rel="noopener"
          aria-label="مشاهده نشان اعتماد اینماد ققنوس"
          href="https://trustseal.enamad.ir/?id=683249&Code=kNJsbo2Cym96iOqBtjSeWJjYDW3nFd98">
          <img
            referrerpolicy="origin"
            src="https://trustseal.enamad.ir/logo.aspx?id=683249&Code=kNJsbo2Cym96iOqBtjSeWJjYDW3nFd98"
            alt="نشان اعتماد اینماد">
        </a>
      </div>

      <div class="back-row">
        <a class="btn btn-primary" href="/">بازگشت به صفحه اصلی</a>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      © تمامی حقوق، برای برند ققنوس، محفوظ است.
    </div>
  </footer>
</body>
</html>
