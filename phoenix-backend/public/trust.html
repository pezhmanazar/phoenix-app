<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>نمادهای اعتماد ققنوس</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="/static/img/favicon.png" />

  <style>
    body{
      margin:0;
      min-height:100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:#0b0f14;
      color:#e8ecf1;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .card{
      width:min(520px, 100%);
      border:1px solid rgba(255,255,255,0.10);
      background:rgba(255,255,255,0.04);
      border-radius:22px;
      padding:24px;
      text-align:center;
      box-shadow:0 20px 60px rgba(0,0,0,0.35);
    }

    h1{
      margin:0 0 10px;
      font-size:20px;
      font-weight:900;
    }

    p{
      margin:0 0 22px;
      color:#9aa4b2;
      font-size:14px;
      line-height:2;
    }

    .trust-row{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:18px;
      flex-wrap:wrap;
      min-height:120px;
    }

    .trust-row img{
      max-width:110px;
      display:block;
    }
  </style>
</head>

<body>
  <main class="card">
    <h1>نمادهای اعتماد ققنوس</h1>
    <p>
      برای بررسی پرداخت امن و نمادهای اعتماد ققنوس، روی نمادها کلیک کنید.
    </p>

    <div class="trust-row">
      <div id="zarinpal">
        <script src="https://www.zarinpal.com/webservice/TrustCode" type="text/javascript"></script>
      </div>

      <a
        referrerpolicy="origin"
        target="_blank"
        rel="noopener"
        aria-label="مشاهده نشان اعتماد اینماد ققنوس"
        href="https://trustseal.enamad.ir/?id=683249&Code=kNJsbo2Cym96iOqBtjSeWJjYDW3nFd98">
        <img
          referrerpolicy="origin"
          src="https://trustseal.enamad.ir/logo.aspx?id=683249&Code=kNJsbo2Cym96iOqBtjSeWJjYDW3nFd98"
          alt="نشان اعتماد اینماد">
      </a>
    </div>
  </main>
</body>
</html>
